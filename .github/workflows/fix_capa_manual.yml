name: Fix Capa Manual

on:
  workflow_dispatch:
    inputs:
      modo:
        description: 'capa_completa (post sem capa, usa imagem_url do produto) ou trocar_fundo (só troca o fundo, mantém produto)'
        required: false
        default: 'capa_completa'
        type: choice
        options:
          - capa_completa
          - trocar_fundo
      post_id:
        description: 'ID do post WordPress'
        required: true
      titulo:
        description: 'Título do produto/post (usado no alt text e keyword Pexels)'
        required: true
      imagem_url:
        description: 'URL da imagem do produto no ML (obrigatório no modo capa_completa)'
        required: false
        default: ''
      capa_atual_url:
        description: 'URL da capa atual do post (obrigatório no modo trocar_fundo)'
        required: false
        default: ''
      pexels_index:
        description: 'Índice da foto Pexels a usar no modo trocar_fundo (0=primeira/já usada, 1=segunda...)'
        required: false
        default: '1'
      slug:
        description: 'Slug do post (opcional — gerado do título se vazio)'
        required: false
        default: ''
      mlb_id:
        description: 'MLB ID (opcional, apenas informativo)'
        required: false
        default: ''

jobs:
  fix-capa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests Pillow gspread google-auth

      - name: Gerar e aplicar capa
        working-directory: scripts
        env:
          REMOVE_BG_API_KEY:      ${{ secrets.REMOVE_BG_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          WORDPRESS_URL:          ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:         ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          CAPA_MODO:              ${{ inputs.modo }}
          CAPA_POST_ID:           ${{ inputs.post_id }}
          CAPA_TITULO:            ${{ inputs.titulo }}
          CAPA_IMAGEM_URL:        ${{ inputs.imagem_url }}
          CAPA_ATUAL_URL:         ${{ inputs.capa_atual_url }}
          CAPA_PEXELS_INDEX:      ${{ inputs.pexels_index }}
          CAPA_SLUG:              ${{ inputs.slug }}
          CAPA_MLB_ID:            ${{ inputs.mlb_id }}
        run: python gerar_capa_manual.py
