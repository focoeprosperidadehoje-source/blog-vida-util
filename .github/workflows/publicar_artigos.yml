name: Publicar Artigos Aprovados

on:
  schedule:
    # Seg-Sex 09h BRT (12h UTC) — 1x/dia, reduzido de 5x/dia (20/07/2026)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # disparo manual para testes ou catch-up
    inputs:
      forcar:
        description: 'Pular checagem de aprovação no Telegram e processar mlbs_pendentes/posts já existentes direto (catch-up manual)'
        required: false
        default: 'false'
      datas_override:
        description: 'Datas ISO (AAAA-MM-DD) separadas por vírgula para os primeiros artigos pendentes — catch-up de dias já passados. Demais seguem agendamento normal.'
        required: false
        default: ''

jobs:
  verificar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests markdown Pillow gspread google-auth

      - name: Detectar aprovação no Telegram
        id: detectar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/detectar_aprovacao.py
        # exit 0 = aprovado | exit 1 = pendente | exit 2 = sem sugestão
        continue-on-error: true

      - name: Gerar e publicar artigos + produtos WooCommerce
        if: steps.detectar.outcome == 'success'
        env:
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_BACKUP:  ${{ secrets.GEMINI_API_KEY_BACKUP }}
          WORDPRESS_URL:          ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:         ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          ML_PUBLISHER_ID:        ${{ secrets.ML_PUBLISHER_ID }}
          ML_TRACKING_WORD:       ${{ secrets.ML_TRACKING_WORD }}
        run: python scripts/gerar_artigo.py

      - name: Gerar capas (remove.bg + Pexels + Pillow)
        if: steps.detectar.outcome == 'success'
        env:
          REMOVE_BG_API_KEY:      ${{ secrets.REMOVE_BG_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          WORDPRESS_URL:          ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:         ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: python scripts/gerar_capa.py

      - name: Atualizar planilha controle_publicacoes
        if: steps.detectar.outcome == 'success'
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/atualizar_planilha.py

      - name: Salvar estado no repositório
        if: always()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ || true
          git diff --staged --quiet || git commit -m "data: atualiza estado $(date +%Y-%m-%dT%H:%M) [skip ci]"
          git push || true
