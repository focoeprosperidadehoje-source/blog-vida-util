name: Publicar Vídeos Meta (Facebook + Instagram)

on:
  schedule:
    # Diário 13h BRT (16h UTC) — publica 1 vídeo por dia
    - cron: '0 16 * * *'
  workflow_dispatch:  # disparo manual para testes

jobs:
  publicar-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar FFmpeg e fontes DejaVu
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: |
          pip install requests edge-tts gspread google-auth google-api-python-client

      - name: Gerar e publicar vídeo do dia
        env:
          WORDPRESS_URL:            ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:           ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD:   ${{ secrets.WORDPRESS_APP_PASSWORD }}
          META_PAGE_ID:             ${{ secrets.META_PAGE_ID }}
          META_IG_ACCOUNT_ID:       ${{ secrets.META_IG_ACCOUNT_ID }}
          META_PAGE_ACCESS_TOKEN:   ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/gerar_video.py

      - name: Salvar estado no repositório
        if: always()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ || true
          git diff --staged --quiet || git commit -m "data: video_publicado atualizado $(date +%Y-%m-%dT%H:%M) [skip ci]"
          git push || true
