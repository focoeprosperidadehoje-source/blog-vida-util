name: Publicar Artigos Aprovados

on:
  schedule:
    # Segunda 08h30 BRT (11h30 UTC) — catch prioritário para aprovações de domingo à noite
    - cron: '30 11 * * 1'
    # Seg-Sex: 09h, 12h, 15h, 17h BRT (12h, 15h, 18h, 20h UTC) — polling regular
    - cron: '0 12,15,18,20 * * 1-5'
  workflow_dispatch:  # disparo manual para testes

jobs:
  verificar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests markdown Pillow gspread google-auth

      - name: Detectar aprovação no Telegram
        id: detectar
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/detectar_aprovacao.py
        # exit 0 = aprovado | exit 1 = pendente | exit 2 = sem sugestão
        continue-on-error: true

      - name: Gerar e publicar artigos + produtos WooCommerce
        if: steps.detectar.outcome == 'success'
        env:
          GEMINI_API_KEY_PRIMARY:  ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_BACKUP:   ${{ secrets.GEMINI_API_KEY_BACKUP }}
          WORDPRESS_URL:           ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:          ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD:  ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          ML_PUBLISHER_ID:         ${{ secrets.ML_PUBLISHER_ID }}
          ML_TRACKING_WORD:        ${{ secrets.ML_TRACKING_WORD }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/gerar_artigo.py

      - name: Gerar capas (remove.bg + Pexels + Pillow)
        if: steps.detectar.outcome == 'success'
        env:
          REMOVE_BG_API_KEY:       ${{ secrets.REMOVE_BG_API_KEY }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          WORDPRESS_URL:           ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:          ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD:  ${{ secrets.WORDPRESS_APP_PASSWORD }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/gerar_capa.py

      - name: Atualizar planilha controle_publicacoes
        if: steps.detectar.outcome == 'success'
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/atualizar_planilha.py
        # Todo o estado transitório (sugestão, aprovação, posts_criados) já fica na
        # aba "estado_pipeline" do Google Sheets — não há mais data/ para commitar.

      - name: Verificar posts publicados
        if: steps.detectar.outcome == 'success'
        env:
          WORDPRESS_URL:           ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER:          ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD:  ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/verificar_post.py
