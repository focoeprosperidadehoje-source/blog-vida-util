name: Sugestão Semanal de Produtos

on:
  schedule:
    - cron: '0 21 * * 0'  # domingo 21h UTC = 18h BRT — antecipa para segunda começar no horário
  workflow_dispatch:       # disparo manual para testes

jobs:
  sugestao:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests gspread google-auth

      - name: Executar sugestão semanal
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          ML_PUBLISHER_ID:          ${{ secrets.ML_PUBLISHER_ID }}
          ML_TRACKING_WORD:         ${{ secrets.ML_TRACKING_WORD }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: python scripts/sugestao_semanal.py
        # Estado salvo na aba "estado_pipeline" do Google Sheets — não em data/*.json
        # do repositório, para não expor título/MLB no histórico Git público.
